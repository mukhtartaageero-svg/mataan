<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MATAAN Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page">

<div class="card">

<h1>MATAAN 🖤</h1>

<form action="/login" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
